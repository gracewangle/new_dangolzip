      const editId = document.getElementById("productForm")?.dataset.editId || "";
      const products = getProducts();
      const existingProduct = editId ? products.find(function(item){ return item.id === editId; }) : null;

      if(!title){ alert("상품명을 입력해주세요."); return; }
      if(salePrice <= 0){ alert("판매가를 입력해주세요."); return; }
      if(supplierPrice <= 0){ alert("공급가를 입력해주세요."); return; }
      if(!isValidDateString(deadline)){ alert("마감일은 YYYY-MM-DD 형식으로 입력해주세요."); return; }
      if(!collectedOptions.length){ alert("옵션을 1개 이상 입력해주세요."); return; }
      if(collectedOptions.some(function(option){ return !option.name; })){
        alert("옵션명을 입력해주세요.");
        return;
      }
      if(collectedOptions.some(function(option){ return !option.priceRaw || option.price < 0; })){
        alert("옵션 가격을 입력해주세요.");
        return;
      }
      if(collectedOptions.some(function(option){ return !option.stockRaw || option.stock < 0; })){
        alert("옵션 재고 수량을 입력해주세요.");
        return;
      }

      const options = collectedOptions.map(function(option){
        return {
          name: option.name,
          price: option.price,
          stock: option.stock
        };
      });

      const product = {
        id: existingProduct?.id || "p_" + Date.now(),
        title: title,
        subtitle: subtitle,
        baseItemName: baseItemName,
        deliveryLabel: deliveryLabel,
        badges: badges,
        description: description,
        thumbnail: productImageDraft.thumbnail,
        detailImages: productImageDraft.detailImages,
        salePrice: salePrice,
        supplierPrice: supplierPrice,
        shippingFee: shippingFee,
        commissionRate: commissionRate,
        status: existingProduct?.status || "selling",
        deadline: deadline,
        options: options,
        createdAt: existingProduct?.createdAt || new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };

      if(existingProduct){
        const index = products.findIndex(function(item){ return item.id === existingProduct.id; });
        products[index] = product;
      }else{
        products.push(product);
      }
      try{
        saveProducts(products);
      }catch(error){
        product.thumbnail = "";
        product.detailImages = [];
        try{
          saveProducts(products);
          alert("상품이 등록되었습니다. 저장 공간 보호를 위해 이미지는 제외했습니다.");
          go(existingProduct ? "admin/products" : "home");
          return;
        }catch(secondError){
          alert("상품 저장 중 문제가 발생했습니다. 다시 시도해주세요.");
          return;
        }
      }
      alert("상품이 등록되었습니다.");
      go(existingProduct ? "admin/products" : "home");
    }

    function setCuratorFormMessage(message){
      const target = document.getElementById("curatorFormMessage");
      if(!target) return;
      target.textContent = message || "";
      target.classList.toggle("show", Boolean(message));
    }

    function saveCuratorFromForm(){
      const form = document.getElementById("curatorForm");
      const editId = form?.dataset.editId || "";
      const id = document.getElementById("curatorId")?.value.trim() || "";
      const name = document.getElementById("curatorName")?.value.trim() || "";
      const phone = document.getElementById("curatorPhone")?.value.trim() || "";
      const status = document.getElementById("curatorStatus")?.value || "active";
      const curators = getCurators();
      setCuratorFormMessage("");
      if(!id){ setCuratorFormMessage("큐레이터 코드를 입력해주세요."); return; }
      if(!name){ setCuratorFormMessage("이름을 입력해주세요."); return; }
      if(!/^[a-zA-Z0-9_-]+$/.test(id)){
        setCuratorFormMessage("큐레이터 코드는 영문, 숫자, -, _ 만 사용할 수 있습니다.");
        return;
      }
      if(!editId && curators.some(function(curator){ return curator.id === id; })){
        setCuratorFormMessage("이미 등록된 큐레이터 코드입니다.");
        return;
      }
      const curator = {
        id: editId || id,
        name: name,
        phone: phone,
        status: status,
        createdAt: curators.find(function(item){ return item.id === editId; })?.createdAt || new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      if(editId){
        const index = curators.findIndex(function(item){ return item.id === editId; });
        if(index >= 0) curators[index] = curator;
      }else{
        curators.push(curator);
      }
      saveCurators(curators);
      renderAdminCurators();
      showToast(editId ? "큐레이터 정보가 저장되었습니다." : "큐레이터가 등록되었습니다.");
    }

    function copyText(text, message){
      const toastMessage = message || "링크가 복사되었습니다.";
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(function(){
          showToast(toastMessage);
        }).catch(function(){
          fallbackCopyText(text, toastMessage);
        });
        return;
      }
      fallbackCopyText(text, toastMessage);
    }

    function fallbackCopyText(text, message){
      const input = document.createElement("textarea");
      input.value = text;
      input.setAttribute("readonly", "");
      input.style.position = "fixed";
      input.style.left = "-9999px";
      document.body.appendChild(input);
      input.select();
      document.execCommand("copy");
      input.remove();
      showToast(message || "링크가 복사되었습니다.");
    }

    function renderAdminSection(type){
      const labels = {
        products: "상품관리",
        orders: "주문관리",
        curators: "큐레이터관리"
      };
      const descriptions = {
        products: "상품 등록 저장, 수정, 삭제 기능은 다음 단계에서 연결합니다.",
        orders: "주문 저장과 주문 상태 관리는 다음 단계에서 연결합니다.",
        curators: "큐레이터 등록과 공유 URL 관리는 다음 단계에서 연결합니다."
      };
      const title = labels[type] || "관리";

      app.innerHTML = `
        ${renderAdminBackButton()}
        <section class="hero">
          <div>
            <h1>${title}</h1>
            <p>${descriptions[type] || "상세 기능 준비중입니다."}</p>
          </div>
          <div class="hero-actions">
            <button class="btn" type="button" data-action="admin-home">관리자 홈</button>
          </div>
        </section>
        <section class="panel" style="margin-top:18px">
          <div class="empty">
            <div>
              <strong>${title} 상세 기능 준비중</strong>
              <p>이번 단계에서는 기본 이동과 데이터 초기화 구조만 안정화했습니다.</p>
              <button class="btn primary" type="button" data-action="admin-home">관리자 홈으로 돌아가기</button>
            </div>
          </div>
        </section>
      `;
    }

    function render(){
      ensureStorage();
      const currentRoute = route();
      setActiveNav(currentRoute);
      logVisit(currentRoute);

      if(currentRoute === "home") renderHome();
      else if(currentRoute === "admin") renderAdminHome();
      else if(currentRoute.startsWith("order/")) renderOrderComplete(currentRoute.split("/")[1]);
      else if(currentRoute.startsWith("product/")) renderProductDetail(currentRoute.split("/")[1]);
      else if(currentRoute === "admin/products") renderAdminProductsManager();
      else if(currentRoute.startsWith("admin/products/edit/")) renderAdminProductsManager(currentRoute.split("/")[3]);
      else if(currentRoute === "admin/orders") renderAdminOrders();
      else if(currentRoute === "admin/curators") renderAdminCurators();
      else if(currentRoute.startsWith("admin/curators/edit/")) renderAdminCurators(currentRoute.split("/")[3]);
      else {
        location.hash = "home";
        return;
      }

      app.focus({preventScroll:true});
    }

    document.addEventListener("submit", function(event){
      if(event.target.id === "curatorForm"){
        event.preventDefault();
        saveCuratorFromForm();
        return;
      }
      if(event.target.id !== "productForm") return;
      event.preventDefault();
      saveProductFromForm();
    });

    document.addEventListener("input", function(event){
      if(["salePrice","supplierPrice","shippingFee","commissionRate"].includes(event.target.id)){
        updateProductCalculation();
      }
      if(event.target.id === "adminOrderSearch"){
        adminOrderSearch = event.target.value || "";
        updateAdminOrderList();
      }
    });

    document.addEventListener("keydown", function(event){
      if(event.target.closest?.("[data-home-qty-plus], [data-home-qty-minus]")) return;
      const homeCard = event.target.closest?.("[data-home-product]");
      if(homeCard && (event.key === "Enter" || event.key === " ")){
        event.preventDefault();
        go("product/" + homeCard.dataset.homeProduct);
        return;
      }
      if(event.target.id !== "deadline") return;
      if(["Tab","Shift","Escape","Enter"].includes(event.key)) return;
      event.preventDefault();
    });

    document.addEventListener("paste", function(event){
      if(event.target.id === "deadline"){
        event.preventDefault();
      }
    });

    document.addEventListener("focusin", function(event){
      if(event.target.id === "deadline" && typeof event.target.showPicker === "function"){
        try{
          event.target.showPicker();
        }catch(error){}
      }
    });

    document.addEventListener("change", function(event){
      if(event.target.id === "thumbnailInput" || event.target.id === "detailImagesInput"){
        handleImageInput(event.target).catch(function(){
          showImageWarning("이미지를 읽는 중 문제가 발생했습니다. 다른 파일로 다시 시도해주세요.");
        });
      }
      const orderStatusSelect = event.target.closest("[data-order-status]");
      if(orderStatusSelect){
        markOrderStatusChanged(orderStatusSelect.dataset.orderStatus, orderStatusSelect.value);
        return;
      }
      if(event.target.id === "adminOrderSelectAll"){
        const checked = event.target.checked;
        filteredAdminOrders().forEach(function(order){
          if(order.id) selectedAdminOrderIds[order.id] = checked;
        });
        if(!checked){
          filteredAdminOrders().forEach(function(order){
            delete selectedAdminOrderIds[order.id];
          });
        }
        updateAdminOrderList();
        return;
      }
      const orderCheckbox = event.target.closest("[data-order-checkbox]");
      if(orderCheckbox){
        const orderId = orderCheckbox.dataset.orderCheckbox;
        if(orderCheckbox.checked) selectedAdminOrderIds[orderId] = true;
        else delete selectedAdminOrderIds[orderId];
        updateSelectedOrderCount();
      }
    });

    document.addEventListener("click", function(event){
      const routeButton = event.target.closest("[data-route]");
      if(routeButton){
        go(routeButton.dataset.route);
        return;
      }

      const goButton = event.target.closest("[data-go]");
      if(goButton){
        go(goButton.dataset.go);
        return;
      }

      const buyButton = event.target.closest("[data-buy]");
      if(buyButton){
        go("product/" + buyButton.dataset.buy);
        showToast("상품 상세 화면으로 이동합니다.");
        return;
      }

      const homeQtyPlus = event.target.closest("[data-home-qty-plus]");
      if(homeQtyPlus){
        event.stopPropagation();
        const productId = homeQtyPlus.dataset.homeProductId || homeQtyPlus.dataset.homeQtyPlus;
        const optionId = homeQtyPlus.dataset.homeQtyPlus;
        const quantity = getHomeQuickQuantity(productId, optionId) + 1;
        setHomeQuickQuantity(productId, optionId, quantity);
        const key = homeOptionKey(productId, optionId);
        const value = Array.from(document.querySelectorAll("[data-home-qty-value]")).find(function(target){
          return target.dataset.homeQtyValue === key;
        });
        if(value) value.textContent = String(quantity);
        updateHomeQuickSummary();
        return;
      }

      const homeQtyMinus = event.target.closest("[data-home-qty-minus]");
      if(homeQtyMinus){
        event.stopPropagation();
        const productId = homeQtyMinus.dataset.homeProductId || homeQtyMinus.dataset.homeQtyMinus;
        const optionId = homeQtyMinus.dataset.homeQtyMinus;
        const quantity = Math.max(0, getHomeQuickQuantity(productId, optionId) - 1);
        setHomeQuickQuantity(productId, optionId, quantity);
        const key = homeOptionKey(productId, optionId);
        const value = Array.from(document.querySelectorAll("[data-home-qty-value]")).find(function(target){
          return target.dataset.homeQtyValue === key;
        });
        if(value) value.textContent = String(quantity);
        updateHomeQuickSummary();
        return;
      }

      const homeToggleOptions = event.target.closest("[data-home-toggle-options]");
      if(homeToggleOptions){
        event.stopPropagation();
        const productId = homeToggleOptions.dataset.homeToggleOptions;
        homeExpandedProducts[productId] = !homeExpandedProducts[productId];
        renderHome();
        return;
      }

      const homeProductCard = event.target.closest("[data-home-product]");
      if(homeProductCard){
        go("product/" + homeProductCard.dataset.homeProduct);
        return;
      }

      const copyCuratorButton = event.target.closest("[data-copy-curator-link]");
      if(copyCuratorButton){
        copyText(curatorLink(copyCuratorButton.dataset.copyCuratorLink));
        return;
      }

      const copyCuratorProductButton = event.target.closest("[data-copy-curator-product-link]");
      if(copyCuratorProductButton){
        copyText(
          curatorProductLink(copyCuratorProductButton.dataset.copyCuratorProductLink, copyCuratorProductButton.dataset.productId),
          "상품 링크가 복사되었습니다."
        );
        return;
      }

      const editCuratorButton = event.target.closest("[data-edit-curator]");
      if(editCuratorButton){
        go("admin/curators/edit/" + editCuratorButton.dataset.editCurator);
        return;
      }

      const deleteCuratorButton = event.target.closest("[data-delete-curator]");
      if(deleteCuratorButton){
        if(!confirm("이 큐레이터를 삭제하시겠습니까?")) return;
        const nextCurators = getCurators().filter(function(curator){
          return curator.id !== deleteCuratorButton.dataset.deleteCurator;
        });
        saveCurators(nextCurators);
        renderAdminCurators();
        showToast("큐레이터를 삭제했습니다.");
        return;
      }

      const editButton = event.target.closest("[data-edit-product]");
      if(editButton){
        go("admin/products/edit/" + editButton.dataset.editProduct);
        return;
      }

      const deleteButton = event.target.closest("[data-delete-product]");
      if(deleteButton){
        if(!confirm("정말 삭제하시겠습니까? 삭제 후 복구할 수 없습니다.")) return;
        const nextProducts = getProducts().filter(function(product){
          return product.id !== deleteButton.dataset.deleteProduct;
        });
        saveProducts(nextProducts);
        renderAdminProductsManager();
        showToast("상품을 삭제했습니다.");
        return;
      }

      const toggleButton = event.target.closest("[data-toggle-product]");
      if(toggleButton){
        const products = getProducts();
        const product = products.find(function(item){ return item.id === toggleButton.dataset.toggleProduct; });
        if(product){
          product.status = (product.status || "selling") === "stopped" ? "selling" : "stopped";
          saveProducts(products);
          renderAdminProductsManager();
          showToast(product.status === "stopped" ? "판매중지로 변경했습니다." : "판매재개로 변경했습니다.");
        }
        return;
      }

      const orderFilterButton = event.target.closest("[data-order-filter]");
      if(orderFilterButton){
        adminOrderFilter = orderFilterButton.dataset.orderFilter || "all";
        document.querySelectorAll("[data-order-filter]").forEach(function(button){
          button.classList.toggle("active", button.dataset.orderFilter === adminOrderFilter);
        });
        updateAdminOrderList();
        return;
      }

      const orderPeriodButton = event.target.closest("[data-order-period]");
      if(orderPeriodButton){
        applyOrderQuickPeriod(orderPeriodButton.dataset.orderPeriod || "all");
        return;
      }

      const saveOrderStatusButton = event.target.closest("[data-save-order-status]");
      if(saveOrderStatusButton){
        const orderId = saveOrderStatusButton.dataset.saveOrderStatus;
        const scope = saveOrderStatusButton.closest("[data-admin-order-scope]") || document;
        const select = scope.querySelector(`[data-order-status="${orderId}"]`);
        if(select) updateOrderStatus(orderId, select.value);
        return;
      }

      const deleteOrderButton = event.target.closest("[data-delete-order]");
      if(deleteOrderButton){
        deleteOrder(deleteOrderButton.dataset.deleteOrder);
        return;
      }

      const qtyPlus = event.target.closest("[data-qty-plus]");
      if(qtyPlus){
        const card = qtyPlus.closest("[data-order-option]");
        const value = card?.querySelector("[data-qty-value]");
        const stock = toNumber(card?.dataset.optionStock);
        const current = toNumber(value?.textContent);
        if(value && stock > 0 && current < stock){
          value.textContent = String(current + 1);
          updateOrderTotal();
        }
        return;
      }

      const qtyMinus = event.target.closest("[data-qty-minus]");
      if(qtyMinus){
        const card = qtyMinus.closest("[data-order-option]");
        const value = card?.querySelector("[data-qty-value]");
        const current = toNumber(value?.textContent);
        if(value && current > 0){
          value.textContent = String(current - 1);
          updateOrderTotal();
        }
        return;
      }

      const paymentTab = event.target.closest("[data-payment-tab]");
      if(paymentTab){
        const method = paymentTab.dataset.paymentTab;
        const card = paymentTab.closest(".payment-card");
        if(card){
          card.dataset.paymentMethod = method;
          card.querySelectorAll("[data-payment-tab]").forEach(function(tab){
            tab.classList.toggle("active", tab.dataset.paymentTab === method);
          });
          card.querySelectorAll("[data-payment-panel]").forEach(function(panel){
            panel.hidden = panel.dataset.paymentPanel !== method;
          });
        }
        return;
      }

      const removeDetailButton = event.target.closest("[data-remove-detail]");
      if(removeDetailButton){
        const index = Number(removeDetailButton.dataset.removeDetail);
        productImageDraft.detailImages.splice(index, 1);
        renderImagePreview();
        return;
      }

      const actionButton = event.target.closest("[data-action]");
      if(!actionButton) return;
      if(actionButton.disabled) return;

      const action = actionButton.dataset.action;
      if(action === "scroll-products"){
        document.getElementById("products")?.scrollIntoView({behavior:"smooth", block:"start"});
      }
      if(action === "scroll-order"){
        document.getElementById("orderForm")?.scrollIntoView({behavior:"smooth", block:"start"});
      }
      if(action === "submit-order"){
        submitGuestOrder();
      }
      if(action === "home-quick-order"){
        startHomeQuickOrder();
      }
      if(action === "download-orders-csv"){
        downloadOrdersCSV();
        return;
      }
      if(action === "apply-order-date-filter"){
        adminOrderStartDate = normalizeDateInputValue(document.getElementById("orderStartDate")?.value || "");
        adminOrderEndDate = normalizeDateInputValue(document.getElementById("orderEndDate")?.value || "");
        renderAdminOrders();
        return;
      }
      if(action === "bulk-change-order-status"){
        applyBulkOrderStatusChange();
        return;
      }
      if(action === "save-selected-order-status"){
        saveSelectedOrderStatusChanges();
        return;
      }
      if(action === "admin-back"){
        goAdminBack();
        return;
      }
      if(action === "search-address"){
        // TODO: 추후 카카오/다음 주소검색 API로 교체한다.
        const currentAddress = document.getElementById("buyerAddress")?.value || "";
        const address = prompt("기본 주소를 입력해주세요.", currentAddress);
        if(address !== null){
          const target = document.getElementById("buyerAddress");
          if(target) target.value = address.trim();
        }
      }
      if(action === "admin-home") go("admin");
      if(action === "admin-products") go("admin/products");
      if(action === "home"){
        if(route().startsWith("order/")) resetBuyerSelections();
        go("home");
      }
      if(action === "add-option"){
        const optionList = document.getElementById("optionList");
        if(optionList) optionList.insertAdjacentHTML("beforeend", renderOptionRow());
      }
      if(action === "remove-option"){
        const row = actionButton.closest("[data-option-row]");
        if(row) row.remove();
      }
      if(action === "remove-thumbnail"){
        productImageDraft.thumbnail = "";
        renderImagePreview();
      }
      if(action === "order-ready"){
        showToast("주문 기능은 다음 단계에서 연결합니다.");
      }
    });

    window.addEventListener("hashchange", render);

    captureRefFromUrl();
    routeProductFromUrl();
    if(!location.hash){
      history.replaceState(null, "", "#home");
    }
    render();
  </script>
</body>
</html>
