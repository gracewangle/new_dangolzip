<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>당골집 | 시니어 공동구매 MVP</title>
  <style>
    :root{
      --bg:#f6f8fb;
      --surface:#ffffff;
      --surface-soft:#f9fafb;
      --text:#111827;
      --muted:#6b7280;
      --primary:#03c75a;
      --primary-dark:#02ad4f;
      --accent:#ff5a1f;
      --border:#e5e7eb;
      --danger:#dc2626;
      --radius:16px;
      --radius-sm:12px;
      --shadow:0 12px 30px rgba(17,24,39,.08);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
      font-size:16px;
      line-height:1.5;
    }
    button,input,select{font:inherit}
    button{cursor:pointer}
    a{color:inherit;text-decoration:none}

    .app{min-height:100vh;display:flex;flex-direction:column}
    .topbar{
      position:sticky;
      top:0;
      z-index:10;
      background:rgba(255,255,255,.96);
      border-bottom:1px solid var(--border);
      backdrop-filter:blur(12px);
    }
    .topbar-inner{
      width:min(1120px,100%);
      min-height:64px;
      margin:0 auto;
      padding:0 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .brand{display:flex;align-items:center;gap:10px;font-weight:900}
    .brand-mark{
      width:38px;
      height:38px;
      border-radius:12px;
      background:var(--primary);
      color:#fff;
      display:grid;
      place-items:center;
      font-weight:900;
      box-shadow:0 8px 18px rgba(3,199,90,.22);
    }
    .brand-text{display:grid;line-height:1.18}
    .brand-text strong{font-size:18px}
    .brand-text span{font-size:12px;color:var(--muted);font-weight:700}

    .nav{display:flex;align-items:center;gap:8px}
    .nav-btn,.btn{
      min-height:46px;
      border:1px solid var(--border);
      border-radius:999px;
      background:#fff;
      color:var(--text);
      padding:0 16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-weight:800;
      transition:background .15s ease,border-color .15s ease,transform .15s ease;
    }
    .nav-btn:hover,.btn:hover{background:#f9fafb}
    .nav-btn:active,.btn:active{transform:translateY(1px)}
    .nav-btn.active{border-color:#9ce9bd;background:#ecfdf3;color:#047a3a}
    .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
    .btn.primary:hover{background:var(--primary-dark)}
    .btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
    .btn.danger{background:var(--danger);border-color:var(--danger);color:#fff}
    .btn.block{width:100%;min-height:54px;border-radius:14px;font-size:17px}
    .btn.secondary{background:#111827;border-color:#111827;color:#fff}
    .btn:disabled{cursor:not-allowed;opacity:.55;background:#e5e7eb;border-color:#d1d5db;color:#6b7280}

    .page{
      width:min(1120px,100%);
      margin:0 auto;
      padding:22px 16px 52px;
      flex:1;
    }
    .hero{
      background:linear-gradient(135deg,#ffffff 0%,#effdf5 100%);
      border:1px solid #d9f6e5;
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:24px;
      display:grid;
      gap:14px;
    }
    .hero h1{margin:0;font-size:28px;line-height:1.25;letter-spacing:-.2px}
    .hero p{margin:0;color:var(--muted);font-size:17px}
    .hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}

    .section-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:14px;
      margin:28px 0 14px;
    }
    .section-head h2{margin:0;font-size:22px}
    .section-head p{margin:4px 0 0;color:var(--muted)}

    .product-grid{display:grid;grid-template-columns:1fr;gap:16px}
    .product-card{
      overflow:hidden;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:0 8px 24px rgba(17,24,39,.06);
    }
    .thumb{
      aspect-ratio:16/10;
      background:linear-gradient(135deg,#f1f5f9,#ffffff);
      border-bottom:1px solid var(--border);
      display:grid;
      place-items:center;
      color:#64748b;
      font-size:18px;
      font-weight:900;
    }
    .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .product-body{padding:18px;display:grid;gap:12px}
    .badge-row{display:flex;gap:8px;flex-wrap:wrap}
    .badge{
      display:inline-flex;
      align-items:center;
      min-height:30px;
      border-radius:999px;
      background:#ecfdf3;
      color:#047a3a;
      padding:0 10px;
      font-size:13px;
      font-weight:900;
    }
    .badge.gray{background:#f3f4f6;color:#4b5563}
    .badge.stop{background:#fef2f2;color:#b91c1c}
    .product-title{margin:0;font-size:21px;line-height:1.35}
    .product-subtitle{margin:0;color:var(--muted);font-size:15px}
    .product-meta{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .meta-box{
      border:1px solid var(--border);
      border-radius:var(--radius-sm);
      background:var(--surface-soft);
      padding:12px;
      display:grid;
      gap:3px;
    }
    .meta-box span{color:var(--muted);font-size:13px;font-weight:800}
    .meta-box strong{font-size:18px}
    .price{color:#e11d48;font-size:24px;font-weight:950}

    .admin-grid{display:grid;grid-template-columns:1fr;gap:14px}
    .admin-card{
      min-height:138px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:0 8px 24px rgba(17,24,39,.06);
      padding:20px;
      display:grid;
      gap:12px;
      align-content:space-between;
    }
    .admin-card h3{margin:0;font-size:22px}
    .admin-card p{margin:0;color:var(--muted)}
    .admin-nav-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
      margin-top:16px;
    }
    .admin-nav-link{
      min-height:44px;
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
      font-weight:950;
    }
    .admin-nav-link.active{
      border-color:var(--primary);
      background:#ecfdf3;
      color:#047a3a;
    }
    .admin-back-row{
      margin:18px 0 14px;
      display:flex;
      justify-content:flex-start;
    }
    .admin-back-btn{
      width:44px;
      height:44px;
      min-height:44px;
      border:1px solid var(--border);
      border-radius:50%;
      background:#fff;
      box-shadow:0 8px 20px rgba(17,24,39,.08);
      padding:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      line-height:1;
      font-weight:950;
    }
    .dashboard-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }
    .dashboard-card{
      border:1px solid var(--border);
      border-radius:16px;
      background:#fff;
      box-shadow:0 8px 22px rgba(17,24,39,.05);
      padding:14px;
      display:grid;
      gap:5px;
    }
    .dashboard-card span{color:var(--muted);font-size:13px;font-weight:850}
    .dashboard-card strong{font-size:22px;line-height:1.15}
    .status-pill-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
    }
    .status-pill{
      border:1px solid var(--border);
      border-radius:999px;
      background:#fff;
      padding:10px 12px;
      display:flex;
      justify-content:space-between;
      gap:8px;
      font-weight:900;
    }
    .dashboard-table-wrap{
      overflow-x:auto;
      border:1px solid var(--border);
      border-radius:16px;
      background:#fff;
    }
    .dashboard-table{
      width:100%;
      min-width:720px;
      border-collapse:separate;
      border-spacing:0;
      font-size:13px;
    }
    .dashboard-table th,
    .dashboard-table td{
      padding:11px 10px;
      border-bottom:1px solid var(--border);
      text-align:left;
      vertical-align:middle;
    }
    .dashboard-table th{background:#f8fafc;color:#64748b;font-weight:950}
    .dashboard-table tr:last-child td{border-bottom:0}
    .curator-table{min-width:1080px}
    .curator-code-cell{display:grid;gap:8px;min-width:180px}
    .curator-code-cell .input{min-height:38px;border-radius:10px;font-size:12px}
    .curator-actions{display:flex;gap:6px;flex-wrap:wrap}
    .curator-actions .btn{min-height:34px;border-radius:10px;padding:0 10px;font-size:12px}
    .curator-product-links{
      margin-top:8px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#f8fafc;
      padding:8px;
    }
    .curator-product-links summary{
      list-style:none;
      cursor:pointer;
      font-weight:950;
      color:#2563eb;
    }
    .curator-product-links summary::-webkit-details-marker{display:none}
    .curator-product-link-list{display:grid;gap:8px;margin-top:8px}
    .curator-product-link-row{
      display:grid;
      gap:6px;
      border:1px solid var(--border);
      border-radius:10px;
      background:#fff;
      padding:8px;
    }
    .curator-product-link-row strong{font-size:13px}
    .curator-product-link-row .input{width:100%;min-height:34px;font-size:11px}
    .dashboard-activity{display:grid;gap:8px}
    .dashboard-activity li{
      list-style:none;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      padding:11px 12px;
      font-weight:850;
    }

    .panel{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:0 8px 24px rgba(17,24,39,.06);
      padding:20px;
    }
    .empty{
      min-height:190px;
      display:grid;
      place-items:center;
      text-align:center;
      color:var(--muted);
      border:1px dashed #cbd5e1;
      border-radius:var(--radius);
      background:#f8fafc;
      padding:24px;
    }
    .empty strong{display:block;color:var(--text);font-size:20px;margin-bottom:6px}
    .storage-list{display:grid;gap:10px;margin-top:14px}
    .storage-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      border:1px solid var(--border);
      border-radius:12px;
      padding:13px 14px;
      background:#fff;
      font-weight:800;
    }
    .storage-row span{color:var(--muted);font-weight:700}
    .form-card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:0 8px 24px rgba(17,24,39,.06);
      padding:18px;
      display:grid;
      gap:18px;
    }
    .form-section{
      display:grid;
      gap:14px;
      padding-bottom:18px;
      border-bottom:1px solid var(--border);
    }
    .form-section:last-child{border-bottom:0;padding-bottom:0}
    .form-section h3{margin:0;font-size:20px}
    .form-grid{display:grid;grid-template-columns:1fr;gap:14px}
    .field{display:grid;gap:8px}
    .field label,.field span{font-weight:900}
    .field small{color:var(--muted);font-weight:700}
    .input,.textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
      color:var(--text);
      padding:13px 14px;
      min-height:50px;
      outline:none;
    }
    .textarea{min-height:112px;resize:vertical}
    .input:focus,.textarea:focus{
      border-color:#78dca5;
      box-shadow:0 0 0 4px rgba(3,199,90,.12);
    }
    .upload-box{
      border:1px dashed #cbd5e1;
      border-radius:16px;
      background:#f8fafc;
      padding:14px;
      display:grid;
      gap:12px;
    }
    .preview-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .preview-item{
      position:relative;
      overflow:hidden;
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
      aspect-ratio:1/1;
    }
    .preview-item img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      background:#fff;
      padding:8px;
      border-radius:14px;
    }
    .preview-remove{
      position:absolute;
      top:8px;
      right:8px;
      min-height:34px;
      border:0;
      border-radius:999px;
      background:rgba(17,24,39,.82);
      color:#fff;
      padding:0 10px;
      font-size:13px;
      font-weight:900;
    }
    .option-list{display:grid;gap:10px}
    .option-row{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      border:1px solid var(--border);
      border-radius:16px;
      background:#fff;
      padding:12px;
    }
    .calc-grid{display:grid;grid-template-columns:1fr;gap:10px}
    .calc-box{
      border:1px solid var(--border);
      border-radius:14px;
      background:var(--surface-soft);
      padding:13px;
      display:grid;
      gap:4px;
    }
    .calc-box span{color:var(--muted);font-size:13px;font-weight:900}
    .calc-box strong{font-size:20px}
    .calc-box.profit strong{color:var(--primary-dark)}
    .warning{
      display:none;
      border:1px solid #fed7aa;
      border-radius:14px;
      background:#fff7ed;
      color:#9a3412;
      padding:12px;
      font-weight:800;
    }
    .warning.show{display:block}
    .form-actions{display:grid;grid-template-columns:1fr;gap:10px}
    .manage-list{display:grid;grid-template-columns:1fr;gap:12px}
    .manage-card{
      display:grid;
      grid-template-columns:82px minmax(0,1fr);
      gap:14px;
      align-items:start;
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:0 8px 24px rgba(17,24,39,.06);
      padding:14px;
    }
    .manage-thumb{
      width:82px;
      aspect-ratio:1/1;
      overflow:hidden;
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
      display:grid;
      place-items:center;
      color:var(--muted);
      font-weight:900;
      font-size:12px;
      text-align:center;
      padding:6px;
    }
    .manage-thumb img{width:100%;height:100%;object-fit:contain;background:#fff;padding:4px;display:block}
    .manage-body{display:grid;gap:9px;min-width:0}
    .manage-body h3{margin:0;font-size:18px;line-height:1.35}
    .manage-meta{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-weight:800;font-size:13px}
    .manage-actions{display:grid;grid-template-columns:1fr;gap:8px}
    .admin-order-summary{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:18px;
    }
    .admin-order-stat{
      border:1px solid var(--border);
      border-radius:16px;
      background:#fff;
      box-shadow:0 8px 22px rgba(17,24,39,.05);
      padding:14px;
      display:grid;
      gap:4px;
    }
    .admin-order-stat span{color:var(--muted);font-size:13px;font-weight:850}
    .admin-order-stat strong{font-size:22px}
    .admin-order-tools{
      display:grid;
      gap:12px;
      border:1px solid var(--border);
      border-radius:18px;
      background:#fff;
      padding:14px;
      margin:18px 0;
    }
    .date-filter-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .quick-date-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .period-summary{margin:0 0 16px}
    .product-summary-table{min-width:680px}
    .order-filter-list{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
    .order-filter-btn{
      white-space:nowrap;
      min-height:40px;
      border:1px solid var(--border);
      border-radius:999px;
      background:#fff;
      padding:0 13px;
      font-weight:900;
    }
    .order-filter-btn.active{border-color:var(--primary);background:#ecfdf3;color:#047a3a}
    .bulk-order-actions{
      display:grid;
      gap:10px;
      border:1px solid #fde68a;
      border-radius:16px;
      background:#fffbeb;
      padding:12px;
    }
    .bulk-order-actions-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }
    .bulk-order-actions .input{max-width:220px}
    .selected-order-count{
      font-weight:950;
      color:#92400e;
    }
    .changed-badge{
      display:inline-flex;
      align-items:center;
      min-height:24px;
      border-radius:999px;
      background:#fef3c7;
      color:#92400e;
      padding:0 8px;
      font-size:12px;
      font-weight:950;
      margin-top:4px;
    }
    .admin-order-list{display:grid;gap:14px}
    .admin-order-table-wrap{display:none}
    .admin-order-card-list{display:grid;gap:14px}
    .admin-order-table-scroll{
      overflow-x:auto;
      border:1px solid var(--border);
      border-radius:18px;
      background:#fff;
      box-shadow:0 8px 24px rgba(17,24,39,.06);
    }
    .admin-order-table{
      width:100%;
      min-width:1500px;
      border-collapse:separate;
      border-spacing:0;
      font-size:13px;
    }
    .admin-order-table th,
    .admin-order-table td{
      padding:12px 10px;
      border-bottom:1px solid var(--border);
      text-align:left;
      vertical-align:middle;
    }
    .admin-order-table th{
      position:sticky;
      top:0;
      z-index:1;
      background:#f8fafc;
      color:#475569;
      font-weight:950;
      white-space:nowrap;
    }
    .admin-order-table tbody tr:hover{background:#f9fafb}
    .admin-order-table tbody tr.order-row-changed{background:#fff7ed}
    .admin-order-table tbody tr.order-row-changed:hover{background:#ffedd5}
    .admin-order-table tbody tr:last-child td{border-bottom:0}
    .admin-order-id{max-width:120px;word-break:break-all;font-weight:900}
    .admin-order-product{max-width:150px;font-weight:900}
    .admin-order-address{
      max-width:210px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      cursor:help;
    }
    .admin-order-item-summary{display:grid;gap:6px;min-width:150px}
    .admin-order-detail summary{
      cursor:pointer;
      color:#2563eb;
      font-weight:950;
      list-style:none;
      display:inline-flex;
      align-items:center;
      min-height:32px;
      border:1px solid #bfdbfe;
      border-radius:10px;
      background:#eff6ff;
      padding:0 10px;
      font-size:12px;
    }
    .admin-order-detail summary::-webkit-details-marker{display:none}
    .admin-order-detail-body{
      margin-top:8px;
      padding:10px;
      border-radius:12px;
      background:#f8fafc;
      display:grid;
      gap:8px;
      min-width:220px;
    }
    .admin-order-detail-body .btn{min-height:38px}
    .admin-order-table .input{min-height:40px;border-radius:10px;padding:0 10px}
    .admin-order-table .input.order-status-changed{border-color:#f97316;box-shadow:0 0 0 3px rgba(249,115,22,.12)}
    .admin-order-table .btn{min-height:40px;border-radius:10px;padding:0 12px}
    .admin-order-save-cell{display:grid;gap:6px;min-width:82px}
    .admin-order-card{
      border:1px solid var(--border);
      border-radius:18px;
      background:#fff;
      box-shadow:0 8px 24px rgba(17,24,39,.06);
      padding:16px;
      display:grid;
      gap:14px;
    }
    .admin-order-card.order-row-changed{border-color:#fdba74;background:#fff7ed}
    .admin-order-head{display:grid;gap:10px}
    .admin-order-title{display:grid;gap:4px}
    .admin-order-title strong{font-size:18px;word-break:break-all}
    .admin-order-title span{color:var(--muted);font-size:13px;font-weight:800}
    .admin-order-status{display:grid;grid-template-columns:1fr;gap:8px}
    .admin-order-fields{display:grid;gap:8px}
    .admin-order-row{
      display:grid;
      grid-template-columns:100px minmax(0,1fr);
      gap:10px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#f9fafb;
      padding:11px 12px;
      font-weight:850;
    }
    .admin-order-row span:first-child{color:var(--muted)}
    .admin-order-row strong,.admin-order-row span:last-child{min-width:0;word-break:break-word}
    .admin-order-items{margin:0;padding-left:18px;display:grid;gap:5px;font-weight:850}
    .admin-order-items li{word-break:break-word}
    .detail-media{
      display:grid;
      gap:18px;
      margin-bottom:18px;
    }
    .detail-summary{
      display:grid;
      grid-template-columns:96px minmax(0,1fr);
      gap:14px;
      align-items:center;
      margin-bottom:16px;
      padding:14px;
      border:1px solid var(--border);

  <script>
    const STORAGE_KEYS = {
      products: "dz_products",
      orders: "dz_orders",
      curators: "dz_curators",
      visitLogs: "dz_visit_logs"
    };
    const STOCK_DEDUCTED_STATUSES = ["paid", "preparing", "shipped", "completed"];
    const PRODUCT_BADGE_OPTIONS = ["추천", "핫딜", "인기", "신상품", "품절임박"];
    const CURRENT_REF_KEY = "dz_current_ref";

    const MOCK_PRODUCTS = [
      {
        id: "p_001",
        title: "난각1번 자연방사 유정란 20구",
        subtitle: "당일산란 무항생제 유정란",
        baseItemName: "난각1번 자연방사 유정란 20구",
        deliveryLabel: "6/30 예약배송",
        badges: ["추천"],
        salePrice: 11900,
        supplierPrice: 8000,
        shippingFee: 0,
        commissionRate: 10,
        thumbnail: "",
        status: "selling",
        deadline: "2026-06-30"
      },
      {
        id: "p_002",
        title: "제주 흑돼지 간편 구이세트 600g",
        subtitle: "소포장으로 부담 없는 가족 식탁 상품",
        baseItemName: "제주 흑돼지 간편 구이세트 600g",
        deliveryLabel: "7/15 예약배송",
        badges: ["핫딜"],
        salePrice: 18900,
        supplierPrice: 13500,
        shippingFee: 3000,
        commissionRate: 8,
        thumbnail: "",
        status: "selling",
        deadline: "2026-07-15"
      }
    ];

    const app = document.getElementById("app");
    const toastEl = document.getElementById("toast");
    let toastTimer = null;
    const IMAGE_MAX_WIDTH = 900;
    const IMAGE_JPEG_QUALITY = 0.7;
    let productImageDraft = {
      thumbnail: "",
      detailImages: []
    };
    let homeQuickQuantities = {};
    let homeExpandedProducts = {};
    let homeQuickOrderDraft = null;
    let adminOrderFilter = "all";
    let adminOrderSearch = "";
    let adminOrderStartDate = "";
    let adminOrderEndDate = "";
    let selectedAdminOrderIds = {};
    let pendingOrderStatusChanges = {};
    const ORDER_STATUS_OPTIONS = [
      ["ordered", "주문접수"],
      ["paid", "입금확인"],
      ["preparing", "배송준비"],
      ["shipped", "배송중"],
      ["completed", "배송완료"],
      ["canceled", "취소"]
    ];
    const BUYER_INFO_KEY = "dz_buyer_info";

    function readJson(key, fallback){
      try{
        const raw = localStorage.getItem(key);
        if(raw === null) return fallback;
        const parsed = JSON.parse(raw);
        return Array.isArray(fallback) && !Array.isArray(parsed) ? fallback : parsed;
      }catch(error){
        return fallback;
      }
    }

    function writeJson(key, value){
      localStorage.setItem(key, JSON.stringify(value));
    }

    function saveProducts(products){
      writeJson(STORAGE_KEYS.products, products);
    }

    function saveOrders(orders){
      writeJson(STORAGE_KEYS.orders, orders);
    }

    function getCurators(){
      return readJson(STORAGE_KEYS.curators, []);
    }

    function saveCurators(curators){
      writeJson(STORAGE_KEYS.curators, curators);
    }

    function toNumber(value){
      const number = Number(String(value || "").replaceAll(",", ""));
      return Number.isFinite(number) ? number : 0;
    }

    function readFileAsDataUrl(file){
      return new Promise(function(resolve, reject){
        const reader = new FileReader();
        reader.onload = function(){ resolve(String(reader.result || "")); };
        reader.onerror = function(){ reject(reader.error); };
        reader.readAsDataURL(file);
      });
    }

    function loadImage(src){
      return new Promise(function(resolve, reject){
        const image = new Image();
        image.onload = function(){ resolve(image); };
        image.onerror = reject;
        image.src = src;
      });
    }

    async function compressImageFile(file){
      const dataUrl = await readFileAsDataUrl(file);
      const image = await loadImage(dataUrl);
      const scale = Math.min(1, IMAGE_MAX_WIDTH / image.width);
      const width = Math.max(1, Math.round(image.width * scale));
      const height = Math.max(1, Math.round(image.height * scale));
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");
      canvas.width = width;
      canvas.height = height;
      context.fillStyle = "#fff";
      context.fillRect(0, 0, width, height);
      context.drawImage(image, 0, 0, width, height);
      return canvas.toDataURL("image/jpeg", IMAGE_JPEG_QUALITY);
    }

    function showImageWarning(message){
      const warning = document.getElementById("imageWarning");
      if(warning){
        warning.textContent = message;
        warning.classList.add("show");
      }
    }

    function ensureStorage(){
      const products = readJson(STORAGE_KEYS.products, null);
      if(!Array.isArray(products)){
        writeJson(STORAGE_KEYS.products, MOCK_PRODUCTS);
      }

      [STORAGE_KEYS.orders, STORAGE_KEYS.curators, STORAGE_KEYS.visitLogs].forEach(function(key){
        if(!Array.isArray(readJson(key, []))){
          writeJson(key, []);
        }
        if(localStorage.getItem(key) === null){
          writeJson(key, []);
        }
      });
    }

    function getRefFromUrl(){
      const searchParams = new URLSearchParams(location.search || "");
      let ref = searchParams.get("ref");
      if(!ref && location.hash.includes("?")){
        const hashQuery = location.hash.split("?")[1] || "";
        const hashParams = new URLSearchParams(hashQuery);
        ref = hashParams.get("ref");
      }
      ref = (ref || "").trim();
      if(ref){
        localStorage.setItem(CURRENT_REF_KEY, ref);
        return ref;
      }
      localStorage.setItem(CURRENT_REF_KEY, "direct");
      return "direct";
    }

    function captureRefFromUrl(){
      const ref = getRefFromUrl();
      localStorage.setItem(CURRENT_REF_KEY, ref);
      return ref;
    }

    function currentRef(){
      return getRefFromUrl();
    }

    function renderCurrentRefBadge(){
      const ref = currentRef();
      const curator = getCurators().find(function(item){ return item.id === ref; });
      const label = ref && ref !== "direct"
        ? (curator?.name ? `${curator.name}님 추천 링크로 접속 중` : "추천 링크로 접속 중")
        : "직접 접속";
      return `<div class="current-ref-badge" aria-label="현재 유입 정보">${escapeHtml(label)}</div>`;
    }

    function logVisit(route){
      let page = "";
      let productId = null;
      if(route === "home") page = "home";
      if(route.startsWith("product/")){
        page = "product_detail";
        productId = route.split("/")[1] || null;
      }
      if(!page) return;
      const logs = readJson(STORAGE_KEYS.visitLogs, []);
      logs.push({
        id: "visit_" + Date.now(),
        ref: currentRef(),
        page: page,
        productId: productId,
        createdAt: Date.now(),
        userAgent: navigator.userAgent
      });
      try{
        writeJson(STORAGE_KEYS.visitLogs, logs.slice(-500));
      }catch(error){
        localStorage.removeItem(STORAGE_KEYS.visitLogs);
        writeJson(STORAGE_KEYS.visitLogs, []);
      }
    }

    function getProducts(){
      return readJson(STORAGE_KEYS.products, []);
    }

    function formatPrice(value){
      return Number(value || 0).toLocaleString("ko-KR") + "원";
    }

    function formatDate(value){
      if(!value) return "-";
      return String(value).replaceAll("-", ".");
    }

    function getBaseItemName(product){
      return String(product?.baseItemName || product?.title || "상품").trim();
    }

    function getDeliveryLabel(product){
      return String(product?.deliveryLabel || (product?.deadline ? formatDate(product.deadline) + " 예약배송" : "예약배송")).trim();
    }

    function getProductBadges(product){
      return Array.isArray(product?.badges) ? product.badges.filter(Boolean) : [];
    }

    function badgeClassName(label){
      if(label === "핫딜") return "hot";
      if(label === "인기") return "popular";
      if(label === "신상품") return "new";
      if(label === "품절임박") return "low";
      return "";
    }

    function isValidDateString(value){
      if(!value) return true;
      if(!/^\d{4}-\d{2}-\d{2}$/.test(value)) return false;
      const parts = value.split("-").map(Number);
      const date = new Date(parts[0], parts[1] - 1, parts[2]);
      return date.getFullYear() === parts[0]
        && date.getMonth() === parts[1] - 1
        && date.getDate() === parts[2];
    }

    function escapeHtml(value){
      return String(value ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function route(){
      return ((location.hash || "#home").replace("#","").split("?")[0]) || "home";
    }

    function go(nextRoute){
      location.hash = nextRoute;
    }

    function showToast(message){
      toastEl.textContent = message;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);

        toastEl.classList.remove("show");
      }, 1800);

    function setActiveNav(currentRoute){

        const normalizedRoute = currentRoute.startsWith("product/") ? "home" : currentRoute;
        const isActive = normalizedRoute === target || normalizedRoute.startsWith(target + "/");
        button.classList.toggle("active", isActive);
      });

              <button class="qty-btn" type="button" data-home-qty-minus="base_${escapeHtml(product.id)}" data-home-product-id="${escapeHtml(product.id)}" ${baseSoldOut ? "disabled" : ""}>-</button>

    function homeOptionKey(productId, optionId){
      return optionId === "base_" + productId ? productId : productId + "::" + optionId;
    }

    function getHomeQuickQuantity(productId, optionId){
      return Math.max(0, toNumber(homeQuickQuantities[homeOptionKey(productId, optionId || "base_" + productId)]));
    }

    function setHomeQuickQuantity(productId, optionId, quantity){
      const key = homeOptionKey(productId, optionId || "base_" + productId);
      const nextQuantity = Math.max(0, Number(quantity || 0));
      if(nextQuantity > 0) homeQuickQuantities[key] = nextQuantity;
      else delete homeQuickQuantities[key];
    }

    function resetBuyerSelections(){
      homeQuickQuantities = {};
      homeQuickOrderDraft = null;
    }

    function renderHomeExtraOption(product, option){
      const stock = Number(option.stock || 0);
      const soldOut = stock <= 0;
      const key = homeOptionKey(product.id, option.id);
      return `
        <div class="home-extra-option-row">
          <div class="home-extra-option-info">
            <strong>${escapeHtml(option.name)}</strong>
            <span>${formatPrice(option.price)} · ${soldOut ? `<b class="soldout">SOLD OUT</b>` : `재고 ${stock}개`}</span>

            <button class="qty-btn" type="button" data-home-qty-plus="${escapeHtml(option.id)}" data-home-product-id="${escapeHtml(product.id)}" ${soldOut ? "disabled" : ""}>+</button>
          </div>
        </div>
      `;
    }

    function isProductSoldOut(product){
      return normalizedProductOptions(product).every(function(option){
        return Number(option.stock || 0) <= 0;
      });
    }

    function getHomeQuickSelections(products){
      return products.flatMap(function(product){
        return normalizedProductOptions(product).map(function(option){
          const quantity = getHomeQuickQuantity(product.id, option.id);
          const optionPrice = Number(option.price || 0);
          return {
            product: product,
            option: option,
            quantity: quantity,
            saleAmount: optionPrice * quantity,
            shippingFee: quantity > 0 ? Number(product.shippingFee || 0) : 0
          };
        });
      }).filter(function(item){
        return item.quantity > 0;
      });
    }

    function getHomeQuickProductSelections(products){
      const map = new Map();
      getHomeQuickSelections(products).forEach(function(selection){
        const existing = map.get(selection.product.id) || {
          product: selection.product,
          quantity: 0,
          saleAmount: 0,
          shippingFee: 0,
          items: []
        };
        existing.quantity += selection.quantity;
        existing.saleAmount += selection.saleAmount;
        existing.shippingFee = Number(selection.product.shippingFee || 0);
        existing.items.push(selection);
        map.set(selection.product.id, existing);
      });
      return Array.from(map.values()).map(function(selection){
        return {
          product: selection.product,
          quantity: selection.quantity,
          saleAmount: selection.saleAmount,
          shippingFee: selection.quantity > 0 ? selection.shippingFee : 0,
          items: selection.items
        };
      });
    }

    function renderHomeOrderSummary(products){
      const productSelections = getHomeQuickProductSelections(products);
      const selections = getHomeQuickSelections(products);
      if(!selections.length) return "";
      const totalQuantity = selections.reduce(function(sum, item){ return sum + item.quantity; }, 0);
      const saleAmount = selections.reduce(function(sum, item){ return sum + item.saleAmount; }, 0);
      const shippingFee = productSelections.reduce(function(sum, item){ return sum + item.shippingFee; }, 0);
      const totalPrice = saleAmount + shippingFee;
      const hasMultipleProducts = productSelections.length > 1;
      return `
        <aside class="home-order-summary" aria-label="홈 빠른 주문 요약">
          <h3>주문 요약</h3>

          ${hasMultipleProducts ? `<div class="home-summary-notice">현재는 한 상품씩 주문할 수 있습니다. 주문할 상품 1개만 선택해주세요.</div>` : ""}

      `;

    function updateHomeQuickSummary(){
      const products = getProducts().filter(function(product){
        return product && product.status === "selling";
      });

      if(summary) summary.innerHTML = renderHomeOrderSummary(products);

    function startHomeQuickOrder(){
      const products = getProducts().filter(function(product){
        return product && product.status === "selling";
      });
      const productSelections = getHomeQuickProductSelections(products);
      if(!productSelections.length){ updateHomeQuickSummary(); return; }
      if(productSelections.length > 1){ updateHomeQuickSummary(); return; }
      homeQuickOrderDraft = {
        productId: productSelections[0].product.id,
        quantities: productSelections[0].items.map(function(item){
          return {
            optionId: item.option.id,
            quantity: item.quantity
          };
        })
      };
      go("product/" + productSelections[0].product.id);
    }

    function applyHomeQuickOrderDraft(productId){
      if(!homeQuickOrderDraft || homeQuickOrderDraft.productId !== productId) return false;
      let applied = false;
      (homeQuickOrderDraft.quantities || []).forEach(function(item){
        const card = Array.from(document.querySelectorAll("[data-order-option]")).find(function(optionCard){
          return optionCard.dataset.orderOption === item.optionId;
        });
        const value = card?.querySelector("[data-qty-value]");
        if(value){
          value.textContent = String(item.quantity);
          applied = true;
        }
      });
      homeQuickOrderDraft = null;
      return applied;
    }

    function renderProductOptions(options){

      `;

    function normalizedProductOptions(product){
      const options = Array.isArray(product.options) ? product.options : [];
      const baseStock = product.baseStock !== undefined
        ? Number(product.baseStock || 0)
        : product.stock !== undefined
          ? Number(product.stock || 0)
          : product.totalStock !== undefined
            ? Number(product.totalStock || 0)
            : 9999;
      const baseItem = {
        id: "base_" + product.id,
        itemType: "base",
        name: getBaseItemName(product),
        price: Number(product.salePrice || 0),
        stock: baseStock
      };
      const optionItems = options.length
        ? options.map(function(option, index){
          return {
            id: option.id || product.id + "_opt_" + index,
            itemType: "option",
            name: option.name || "기본 옵션",
            price: Number(option.price || product.salePrice || 0),
            stock: Number(option.stock || 0)
          };
        })
        : [];
      return [baseItem].concat(optionItems);
    }

        ? option.stock !== undefined ? Number(option.stock) : 9999
        : Number(option.stock || 0);
      const soldOut = stock <= 0;
      return `
        <article class="order-option-card ${soldOut ? "is-soldout" : ""}" data-order-option="${escapeHtml(option.id)}" data-item-type="${escapeHtml(option.itemType || "option")}" data-option-name="${escapeHtml(option.name)}" data-option-price="${Number(option.price || 0)}" data-option-stock="${stock}">
          <div class="order-option-info">
            <strong>${escapeHtml(option.name)}</strong>
            <span>${formatPrice(option.price)} · ${soldOut ? `<b class="soldout">SOLD OUT</b>` : `재고 ${stock}개`}</span>
          </div>
          <div class="qty-control">
            <button class="qty-btn" type="button" data-qty-minus ${soldOut ? "disabled" : ""}>-</button>
            <span class="qty-value" data-qty-value>0</span>
            <button class="qty-btn" type="button" data-qty-plus ${soldOut ? "disabled" : ""}>+</button>
          </div>

    function selectedOrderItems(){
      return Array.from(document.querySelectorAll("[data-order-option]")).map(function(card){
        const quantity = Number(toNumber(card.querySelector("[data-qty-value]")?.textContent));
        const optionPrice = Number(toNumber(card.dataset.optionPrice));
        return {
          itemType: card.dataset.itemType || "option",
          optionId: card.dataset.orderOption,
          optionName: card.dataset.optionName || "",
          optionPrice: optionPrice,
          quantity: quantity,
          lineTotal: optionPrice * quantity
        };
      }).filter(function(item){
        return item.quantity > 0;
      });
    }

    function updateOrderTotal(){
      const items = selectedOrderItems();
      const productId = document.getElementById("orderForm")?.dataset.orderProduct || "";
      const product = getProducts().find(function(item){ return item.id === productId; });
      const saleAmount = items.reduce(function(sum, item){ return sum + item.lineTotal; }, 0);
      const shippingFee = items.length ? Number(product?.shippingFee || 0) : 0;
      const totalPrice = saleAmount + shippingFee;
      const saleTarget = document.getElementById("orderSaleAmount");
      const shipTarget = document.getElementById("orderShippingFee");
      const totalTarget = document.getElementById("orderTotalPrice");
      if(saleTarget) saleTarget.textContent = formatPrice(saleAmount);
      if(shipTarget) shipTarget.textContent = formatPrice(shippingFee);
      if(totalTarget) totalTarget.textContent = formatPrice(totalPrice);
      document.querySelectorAll("[data-pay-sale]").forEach(function(target){
        target.textContent = formatPrice(saleAmount);
      });
      document.querySelectorAll("[data-pay-total]").forEach(function(target){
        target.textContent = formatPrice(totalPrice);
      });
    }

    function setOrderFormError(message){
      const errorBox = document.getElementById("orderFormError");
      if(!errorBox) return;
      errorBox.textContent = message || "";
      errorBox.classList.toggle("show", Boolean(message));
      if(message) errorBox.scrollIntoView({behavior:"smooth", block:"center"});
    }

    function submitGuestOrder(){
      const productId = document.getElementById("orderForm")?.dataset.orderProduct || "";
      const product = getProducts().find(function(item){ return item.id === productId; });
      setOrderFormError("");
      if(!product){ setOrderFormError("상품 정보를 찾을 수 없습니다."); return; }
      if((product.status || "selling") === "stopped"){ setOrderFormError("판매중지 상품은 주문할 수 없습니다."); return; }

      const selectedItems = selectedOrderItems();
      const items = selectedItems.map(function(item){
        const optionPrice = Number(item.optionPrice || 0);
        const quantity = Number(item.quantity || 0);
        return {
          itemType: item.itemType || "option",
          optionId: item.optionId || "",
          optionName: item.optionName || "",
          optionPrice: optionPrice,
          quantity: quantity,
          lineTotal: optionPrice * quantity
        };
      }).filter(function(item){ return item.quantity > 0; });
      const quantity = items.reduce(function(sum, item){ return sum + Number(item.quantity || 0); }, 0);
      const buyerNickname = document.getElementById("buyerNickname")?.value.trim() || "";
      const buyerPhone = document.getElementById("buyerPhone")?.value.trim() || "";
      const postalCode = document.getElementById("postalCode")?.value.trim() || "";
      const buyerAddress = document.getElementById("buyerAddress")?.value.trim() || "";
      const buyerAddressDetail = document.getElementById("buyerAddressDetail")?.value.trim() || "";
      const entranceMethod = document.getElementById("entranceMethod")?.value.trim() || "";
      const orderMemo = document.getElementById("orderMemo")?.value.trim() || "";
      const saveBuyerInfo = Boolean(document.getElementById("saveBuyerInfo")?.checked);
      const paymentMethod = document.querySelector(".payment-card")?.dataset.paymentMethod || "bank";
      const depositorName = document.getElementById("depositorName")?.value.trim() || "";
      const payerName = document.getElementById("payerName")?.value.trim() || "";

      if(quantity < 1){ setOrderFormError("구매할 상품 수량을 1개 이상 선택해주세요."); return; }
      if(!buyerNickname){ setOrderFormError("단체카톡방 닉네임을 입력해주세요."); return; }
      if(!buyerPhone){ setOrderFormError("연락처를 입력해주세요."); return; }
      if(!buyerAddress){ setOrderFormError("기본 주소를 입력해주세요."); return; }
      if(!buyerAddressDetail){ setOrderFormError("상세 주소를 입력해주세요."); return; }
      if(!entranceMethod){ setOrderFormError("출입방법을 입력해주세요."); return; }
      if(paymentMethod === "bank" && !depositorName){ setOrderFormError("입금자명을 입력해주세요."); return; }
      if(paymentMethod === "seoulpay" && !payerName){ setOrderFormError("결제자명을 입력해주세요."); return; }

      const saleAmount = items.reduce(function(sum, item){ return sum + Number(item.lineTotal || 0); }, 0);
      const shippingFee = quantity >= 1 ? Number(product.shippingFee || 0) : 0;
      const totalPrice = saleAmount + shippingFee;
      const ref = currentRef();
      const settlement = calculateOrderSettlement({productId: product.id, ref: ref, curatorId: ref, items: items, saleAmount: saleAmount}, product);
      const order = {
        id: "o_" + Date.now(),
        ref: ref,
        curatorId: ref,
        productId: product.id,
        productTitle: product.title || "",
        optionId: items[0]?.optionId || "",
        optionName: items.length === 1 ? items[0].optionName : items[0].optionName + " 외 " + (items.length - 1) + "개",
        items: items,
        quantity: quantity,
        saleAmount: saleAmount,
        supplyAmount: settlement.supplyAmount,
        curatorCommissionRate: settlement.curatorCommissionRate,
        curatorCommission: settlement.curatorCommission,
        grossMargin: settlement.grossMargin,
        localbeeProfit: settlement.localbeeProfit,
        shippingFee: shippingFee,
        totalPrice: totalPrice,
        buyerName: buyerNickname,
        buyerNickname: buyerNickname,
        buyerPhone: buyerPhone,
        postalCode: postalCode,
        buyerAddress: buyerAddress,
        buyerAddressDetail: buyerAddressDetail,
        entranceMethod: entranceMethod,
        orderMemo: orderMemo,
        saveBuyerInfo: saveBuyerInfo,
        depositorName: depositorName,
        payerName: paymentMethod === "seoulpay" ? payerName : "",
        paymentMethod: paymentMethod,
        status: "ordered",
        createdAt: new Date().toISOString()
      };

      const orders = readJson(STORAGE_KEYS.orders, []);
      orders.push(order);
      saveOrders(orders);
      if(saveBuyerInfo){
        writeJson(BUYER_INFO_KEY, {
          buyerNickname: buyerNickname,
          buyerPhone: buyerPhone,
          postalCode: postalCode,
          buyerAddress: buyerAddress,
          buyerAddressDetail: buyerAddressDetail,
          entranceMethod: entranceMethod,
          orderMemo: orderMemo,
          saveBuyerInfo: true
        });
      }else{
        localStorage.removeItem(BUYER_INFO_KEY);
      }
      resetBuyerSelections();
      go("order/" + order.id);
    }

    function formatDateTime(value){
      if(!value) return "-";
      const date = new Date(value);
      if(Number.isNaN(date.getTime())) return escapeHtml(value);
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      const hh = String(date.getHours()).padStart(2, "0");
      const min = String(date.getMinutes()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd} ${hh}:${min}`;
    }

    function orderItems(order){
      if(Array.isArray(order.items) && order.items.length){
        return order.items.map(function(item){
          const optionPrice = Number(item.optionPrice || 0);
          const quantity = Number(item.quantity || 0);
          return {
            itemType: item.itemType || "option",
            optionId: item.optionId || "",
            optionName: item.optionName || order.optionName || "",
            optionPrice: optionPrice,
            quantity: quantity,
            lineTotal: Number(item.lineTotal || optionPrice * quantity)
          };
        });
      }
      return [{
        itemType: "option",
        optionId: order.optionId || "",
        optionName: order.optionName || "",
        optionPrice: Number(order.saleAmount || order.totalPrice || 0),
        quantity: Number(order.quantity || 0),
        lineTotal: Number(order.saleAmount || order.totalPrice || 0)
      }];
    }

    function toDateInputValue(date){
      const d = new Date(date);
      if(Number.isNaN(d.getTime())) return "";
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function normalizeDateInputValue(value){
      const text = String(value || "").trim();
      if(!/^\d{4}-\d{2}-\d{2}$/.test(text)) return "";
      const date = new Date(text + "T00:00:00");
      if(Number.isNaN(date.getTime())) return "";
      return toDateInputValue(date) === text ? text : "";
    }

    function safeDateInputValue(value){
      if(!value) return "";
      if(typeof value === "string"){
        if(/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? "" : toDateInputValue(date);
      }
      return toDateInputValue(value);
    }

    function orderDateRange(){
      const startValue = normalizeDateInputValue(adminOrderStartDate);
      const endValue = normalizeDateInputValue(adminOrderEndDate);
      const singleDay = startValue || endValue;
      const rangeStartValue = startValue || (!endValue ? "" : singleDay);
      const rangeEndValue = endValue || (!startValue ? "" : singleDay);
      const start = rangeStartValue ? new Date(rangeStartValue + "T00:00:00") : null;
      const end = rangeEndValue ? new Date(rangeEndValue + "T23:59:59.999") : null;
      return {
        start: start && !Number.isNaN(start.getTime()) ? start : null,
        end: end && !Number.isNaN(end.getTime()) ? end : null
      };
    }

    function isOrderInDateRange(order){
      const range = orderDateRange();
      if(!range.start && !range.end) return true;
      const createdAt = new Date(order.createdAt || 0);
      const time = createdAt.getTime();
      if(Number.isNaN(time)) return false;
      if(range.start && time < range.start.getTime()) return false;
      if(range.end && time > range.end.getTime()) return false;
      return true;
    }

    function orderRef(order){

    function findOrderProduct(order){
      return getProducts().find(function(product){

      }) || null;

    function findProductOption(product, item){
      if(!product || !Array.isArray(product.options)) return null;
      return product.options.find(function(option, index){
        const fallbackId = product.id + "_opt_" + index;
        return (option.id || fallbackId) === item.optionId || option.name === item.optionName;
      }) || null;
    }

    function calculateOrderSettlement(order, productOverride){
      const product = productOverride || findOrderProduct(order);
      const items = orderItems(order);
      const saleAmount = items.reduce(function(sum, item){
        return sum + Number(item.lineTotal || 0);
      }, 0) || Number(order.saleAmount || 0);
      const productSupplyPrice = Number(product?.supplierPrice || 0);
      const supplyAmount = items.length
        ? items.reduce(function(sum, item){
          const quantity = Number(item.quantity || 0);
          if(item.itemType === "base") return sum + productSupplyPrice * quantity;
          const option = findProductOption(product, item);
          const optionSupplyPrice = option && option.supplierPrice !== undefined
            ? Number(option.supplierPrice || 0)
            : productSupplyPrice;
          return sum + optionSupplyPrice * quantity;
        }, 0)
        : Number(order.supplyAmount || 0);
      const commissionRate = isDirectOrder(order) ? 0 : Number(order.curatorCommissionRate ?? product?.commissionRate ?? 0);
      const curatorCommission = Math.round(saleAmount * commissionRate / 100);
      const grossMargin = saleAmount - supplyAmount;
      const localbeeProfit = grossMargin - curatorCommission;
      return {
        saleAmount: saleAmount,
        supplyAmount: supplyAmount,
        curatorCommissionRate: commissionRate,
        curatorCommission: curatorCommission,
        grossMargin: grossMargin,
        localbeeProfit: localbeeProfit
      };
    }

    function orderSettlement(order){
      const calculated = calculateOrderSettlement(order);
      const saleAmount = Number(order.saleAmount ?? calculated.saleAmount);
      const supplyAmount = order.supplyAmount !== undefined ? Number(order.supplyAmount || 0) : calculated.supplyAmount;
      const grossMargin = order.grossMargin !== undefined ? Number(order.grossMargin || 0) : saleAmount - supplyAmount;
      const direct = isDirectOrder(order);
      const curatorCommissionRate = direct ? 0 : (order.curatorCommissionRate !== undefined ? Number(order.curatorCommissionRate || 0) : calculated.curatorCommissionRate);
      const curatorCommission = direct ? 0 : (order.curatorCommission !== undefined ? Number(order.curatorCommission || 0) : calculated.curatorCommission);
      const localbeeProfit = direct ? grossMargin : (order.localbeeProfit !== undefined ? Number(order.localbeeProfit || 0) : grossMargin - curatorCommission);
      return {
        saleAmount: saleAmount,
        supplyAmount: supplyAmount,
        curatorCommissionRate: curatorCommissionRate,
        curatorCommission: curatorCommission,
        grossMargin: grossMargin,
        localbeeProfit: localbeeProfit
      };
    }

    function applyStockDeltaForOrder(order, direction){
      const products = getProducts();
      const product = products.find(function(item){ return item.id === order.productId; });
      if(!product) return false;
      (Array.isArray(order.items) ? order.items : []).forEach(function(item){
        const quantity = Number(item.quantity || 0) * direction;
        if(!quantity) return;
        if(item.itemType === "base"){
          if(product.baseStock !== undefined){
            product.baseStock = Math.max(0, Number(product.baseStock || 0) - quantity);
          }else if(product.stock !== undefined){
            product.stock = Math.max(0, Number(product.stock || 0) - quantity);
          }else if(product.totalStock !== undefined){
            product.totalStock = Math.max(0, Number(product.totalStock || 0) - quantity);
          }
          // 재고 필드가 없는 기본상품은 MVP에서 차감하지 않는다.
          return;
        }
        const option = Array.isArray(product.options)
          ? product.options.find(function(optionItem){
            return (optionItem.id || "") === item.optionId || optionItem.name === item.optionName;
          })
          : null;
        if(option){
          option.stock = Math.max(0, Number(option.stock || 0) - quantity);
        }
      });
      product.status = isProductSoldOut(product) ? "soldout" : (product.status === "soldout" ? "selling" : product.status || "selling");
      saveProducts(products);
      return true;
    }

      const settings = options || {};
      const orders = readJson(STORAGE_KEYS.orders, []);
      const order = orders.find(function(item){ return item.id === orderId; });
      if(!order) return false;
      const oldStatus = order.status || "ordered";
      const newStatus = status || "ordered";
      const wasStockDeductedStatus = isStockDeductedStatus(oldStatus);
      const willBeStockDeductedStatus = isStockDeductedStatus(newStatus);
      if(!wasStockDeductedStatus && willBeStockDeductedStatus && !order.stockDeducted){
        applyStockDeltaForOrder(order, 1);
        order.stockDeducted = true;
      }
      if(wasStockDeductedStatus && newStatus === "canceled" && order.stockDeducted){
        applyStockDeltaForOrder(order, -1);
        order.stockDeducted = false;
      }
      order.status = status;
      saveOrders(orders);
      if(route() === "admin/orders" && !settings.skipRender){
        renderAdminOrders();
        document.querySelectorAll(`[data-order-status-message="${orderId}"]`).forEach(function(message){
          message.textContent = "저장됨";
        });
        return true;
      }
      document.querySelectorAll(`[data-order-current-status="${orderId}"]`).forEach(function(label){
        label.textContent = orderStatusLabel(status);
      });
      document.querySelectorAll(`[data-order-status-message="${orderId}"]`).forEach(function(message){
        message.textContent = "저장됨";
      });
      return true;
    }

    function downloadOrdersCSV(){
      try{
        const orders = JSON.parse(localStorage.getItem("dz_orders") || "[]");

        if(!Array.isArray(orders)){
          throw new Error("orders가 배열이 아닙니다.");
        }

        const safe = function(value){
          const str = String(value ?? "");
          return `"${str.replace(/"/g, '""')}"`;
        };
        const won = function(value){
          return Number(value || 0);
        };
        const headers = [
          "주문번호",
          "주문일시",
          "주문상태",
          "유입",
          "상품명",
          "선택상품",
          "총수량",
          "상품금액",
          "배송비",
          "총주문금액",
          "닉네임",
          "연락처",
          "주소",
          "상세주소",
          "출입방법",
          "요청사항",
          "결제수단",
          "결제자명"
        ];

        const rows = orders.map(function(order){
          const itemsText = (Array.isArray(order.items) ? order.items : []).map(function(item){
            return (item.optionName || "") + " x " + (item.quantity || 0) + "개";
          }).join(" / ");

          return [
            order.id || "",
            order.createdAt || "",
            order.status || "",
            order.ref || "direct",
            order.productTitle || "",
            itemsText,
            order.quantity || 0,
            won(order.saleAmount),
            won(order.shippingFee),
            won(order.totalPrice),
            order.buyerNickname || order.buyerName || "",
            order.buyerPhone || "",
            order.buyerAddress || "",
            order.buyerAddressDetail || "",
            order.entranceMethod || "",
            order.orderMemo || "",
            order.paymentMethod || "",
            order.payerName || order.depositorName || ""
          ];
        });

        const csv = [
          headers.map(safe).join(","),
          ...rows.map(function(row){ return row.map(safe).join(","); })
        ].join("\r\n");

        if(!csv){
          throw new Error("CSV 내용이 비어 있습니다.");
        }

        const blob = new Blob(["\uFEFF" + csv], {type:"text/csv;charset=utf-8;"});

        if(blob.size <= 0){
          throw new Error("CSV Blob 크기가 0입니다.");
        }

        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "dangolzip_orders.csv";
        a.setAttribute("download", "dangolzip_orders.csv");
        a.style.display = "none";
        document.body.appendChild(a);
        a.click();

        setTimeout(function(){
          if(a.parentNode) document.body.removeChild(a);
          window.URL.revokeObjectURL(url);
        }, 100);

        if(typeof showToast === "function"){
          showToast("CSV 파일을 다운로드했습니다.");
        }
      }catch(error){
        console.error("CSV 다운로드 실패:", error);
        if(typeof showToast === "function"){
          showToast("CSV 다운로드 실패: 콘솔을 확인해주세요.");
        }
      }
    }

    function updateProductCalculation(){
      const salePrice = toNumber(document.getElementById("salePrice")?.value);
      const supplierPrice = toNumber(document.getElementById("supplierPrice")?.value);
      const commissionRate = toNumber(document.getElementById("commissionRate")?.value);
      const shippingFee = toNumber(document.getElementById("shippingFee")?.value);
      const margin = salePrice - supplierPrice;
      const commission = Math.round(salePrice * commissionRate / 100);
      const localbee = margin - commission;

      const targets = {
        calcMargin: margin,
        calcCommission: commission,
        calcLocalbee: localbee,
        calcShipping: shippingFee
      };
      Object.keys(targets).forEach(function(id){
        const target = document.getElementById(id);
        if(target) target.textContent = formatPrice(targets[id]);
      });
    }

        }).join("");
      }
    }

    async function handleImageInput(input){
      const files = Array.from(input.files || []);
      if(!files.length) return;

      const accepted = [];
      for(const file of files){
        try{
          accepted.push(await compressImageFile(file));
        }catch(error){
          showImageWarning("일부 이미지를 압축하지 못했습니다. 해당 이미지는 제외하고 계속 진행합니다.");
        }
      }

      if(input.id === "thumbnailInput"){
        productImageDraft.thumbnail = accepted[0] || "";
      }
      if(input.id === "detailImagesInput"){
        productImageDraft.detailImages = productImageDraft.detailImages.concat(accepted);
      }
      input.value = "";
      renderImagePreview();
    }

      return Array.from(document.querySelectorAll("[data-option-row]")).map(function(row){

          price: toNumber(row.querySelector("[data-option-price]")?.value),
          stock: toNumber(row.querySelector("[data-option-stock]")?.value),
          priceRaw: row.querySelector("[data-option-price]")?.value.trim() || "",
          stockRaw: row.querySelector("[data-option-stock]")?.value.trim() || ""
        };
      }).filter(function(option){
        return option.name || option.priceRaw || option.stockRaw;
      });
    }
